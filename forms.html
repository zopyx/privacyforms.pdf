<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Elements Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 20px;
            background: white;
        }
        legend {
            font-weight: bold;
            color: #555;
            padding: 0 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #444;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }
        input[type="checkbox"], input[type="radio"] {
            width: auto;
            margin-right: 8px;
        }
        input[type="color"] {
            height: 40px;
            padding: 2px;
        }
        input[type="range"] {
            padding: 0;
        }
        .checkbox-group, .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .checkbox-group label, .radio-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }
        .inline-group {
            display: flex;
            gap: 10px;
        }
        .inline-group .form-group {
            flex: 1;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        button[type="submit"] {
            background-color: #4CAF50;
            color: white;
        }
        button[type="submit"]:hover {
            background-color: #45a049;
        }
        button[type="reset"] {
            background-color: #f44336;
            color: white;
        }
        button[type="reset"]:hover {
            background-color: #da190b;
        }
        button[type="button"] {
            background-color: #2196F3;
            color: white;
        }
        button[type="button"]:hover {
            background-color: #0b7dda;
        }
        .required {
            color: #f44336;
        }
        output {
            display: inline-block;
            margin-left: 10px;
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>📝 HTML Form Elements Demo</h1>
    
    <form action="#" method="post" enctype="multipart/form-data">
        
        <!-- Text Inputs -->
        <fieldset>
            <legend>Text Inputs</legend>
            
            <div class="form-group">
                <label for="text">Text <span class="required">*</span></label>
                <input type="text" id="text" name="text" placeholder="Enter text" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" minlength="8">
            </div>
            
            <div class="form-group">
                <label for="tel">Telephone</label>
                <input type="tel" id="tel" name="tel" placeholder="+1 (555) 123-4567" pattern="[0-9\-\+\s\(\)]*">
            </div>
            
            <div class="form-group">
                <label for="url">URL</label>
                <input type="url" id="url" name="url" placeholder="https://example.com">
            </div>
            
            <div class="form-group">
                <label for="search">Search</label>
                <input type="search" id="search" name="search" placeholder="Search...">
            </div>
        </fieldset>
        
        <!-- Number Inputs -->
        <fieldset>
            <legend>Number Inputs</legend>
            
            <div class="form-group">
                <label for="number">Number</label>
                <input type="number" id="number" name="number" placeholder="Enter a number" step="any">
            </div>
            
            <div class="form-group">
                <label for="quantity">Quantity (1-100)</label>
                <input type="number" id="quantity" name="quantity" min="1" max="100" value="1">
            </div>
            
            <div class="form-group">
                <label for="price">Price (step 0.01)</label>
                <input type="number" id="price" name="price" min="0" step="0.01" placeholder="0.00">
            </div>
        </fieldset>
        
        <!-- Date & Time Inputs -->
        <fieldset>
            <legend>Date & Time Inputs</legend>
            
            <div class="inline-group">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date">
                </div>
                
                <div class="form-group">
                    <label for="time">Time</label>
                    <input type="time" id="time" name="time">
                </div>
            </div>
            
            <div class="inline-group">
                <div class="form-group">
                    <label for="datetime-local">DateTime Local</label>
                    <input type="datetime-local" id="datetime-local" name="datetime-local">
                </div>
                
                <div class="form-group">
                    <label for="month">Month</label>
                    <input type="month" id="month" name="month">
                </div>
            </div>
            
            <div class="form-group">
                <label for="week">Week</label>
                <input type="week" id="week" name="week">
            </div>
        </fieldset>
        
        <!-- Selection Inputs -->
        <fieldset>
            <legend>Selection Inputs</legend>
            
            <div class="form-group">
                <label for="country">Select Dropdown</label>
                <select id="country" name="country">
                    <option value="">-- Select a country --</option>
                    <optgroup label="North America">
                        <option value="us">United States</option>
                        <option value="ca">Canada</option>
                        <option value="mx">Mexico</option>
                    </optgroup>
                    <optgroup label="Europe">
                        <option value="uk">United Kingdom</option>
                        <option value="de">Germany</option>
                        <option value="fr">France</option>
                    </optgroup>
                    <optgroup label="Asia">
                        <option value="jp">Japan</option>
                        <option value="cn">China</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="form-group">
                <label for="browser">Datalist (Autocomplete)</label>
                <input list="browsers" id="browser" name="browser" placeholder="Choose or type a browser">
                <datalist id="browsers">
                    <option value="Chrome">
                    <option value="Firefox">
                    <option value="Safari">
                    <option value="Edge">
                    <option value="Opera">
                </datalist>
            </div>
            
            <div class="form-group">
                <label for="multi">Multi-Select</label>
                <select id="multi" name="multi" multiple size="4">
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                    <option value="option4">Option 4</option>
                </select>
                <small>Hold Ctrl/Cmd to select multiple</small>
            </div>
        </fieldset>
        
        <!-- Checkbox & Radio -->
        <fieldset>
            <legend>Checkbox & Radio</legend>
            
            <div class="form-group">
                <label>Checkboxes</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="interests" value="coding"> Coding</label>
                    <label><input type="checkbox" name="interests" value="design"> Design</label>
                    <label><input type="checkbox" name="interests" value="music"> Music</label>
                    <label><input type="checkbox" name="interests" value="sports"> Sports</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Radio Buttons</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                    <label><input type="radio" name="gender" value="other"> Other</label>
                    <label><input type="radio" name="gender" value="prefer-not"> Prefer not to say</label>
                </div>
            </div>
        </fieldset>
        
        <!-- Special Inputs -->
        <fieldset>
            <legend>Special Inputs</legend>
            
            <div class="form-group">
                <label for="color">Color Picker</label>
                <input type="color" id="color" name="color" value="#4CAF50">
            </div>
            
            <div class="form-group">
                <label for="range">Range Slider</label>
                <input type="range" id="range" name="range" min="0" max="100" value="50" oninput="rangeValue.value = this.value">
                <output id="rangeValue">50</output>
            </div>
            
            <div class="form-group">
                <label for="file">File Upload</label>
                <input type="file" id="file" name="file" accept=".jpg,.png,.pdf">
            </div>
            
            <div class="form-group">
                <label for="files">Multiple Files</label>
                <input type="file" id="files" name="files" multiple accept="image/*">
            </div>
            
            <div class="form-group">
                <label for="hidden">Hidden Field</label>
                <input type="text" id="hidden" name="hidden" value="hidden-value" disabled placeholder="This would be type='hidden'">
                <small>Hidden fields are not visible but sent with form data</small>
            </div>
        </fieldset>
        
        <!-- Textarea -->
        <fieldset>
            <legend>Textarea</legend>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Enter your message here..."></textarea>
            </div>
        </fieldset>
        
        <!-- Buttons -->
        <fieldset>
            <legend>Buttons</legend>
            
            <div class="button-group">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
                <button type="button" onclick="alert('Button clicked!')">Click Me</button>
            </div>
        </fieldset>
        
    </form>
</body>
</html>
